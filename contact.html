<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Contact Us – Sarkari Prakashan</title>

  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css?v=4">
  <style>
    /* Extra styles for contact form */
    .contact-wrapper {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .contact-wrapper h1 {
      text-align: center;
      margin-bottom: 18px;
      color: var(--accent);
    }
    form label {
      font-weight: 600;
      display: block;
      margin: 12px 0 4px;
    }
    form input, form textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
    }
    form textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-button {
      margin-top: 16px;
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .form-button:hover {
      background: #0552c6;
    }
    .contact-info {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="brand">Sarkari Prakashan</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="terms.html">Terms</a>
      </nav>
    </div>
  </header>
  

  <main class="container">
    <div class="contact-wrapper">
      <h1>📩 Contact Us</h1>
      <p style="text-align:center; color:#555;">
        Have questions, feedback, or suggestions? Fill out the form below and we’ll get back to you soon.
      </p>

      <form onsubmit="handleContact(event)">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

        <button type="submit" class="form-button">Send Message</button>
      </form>

      <div class="contact-info">
        <p>📧 Email: infosarkariportal@gmail.com</p>
        
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="policy-list">
      <a href="privacy.html">Privacy Policy</a>
      <a href="disclaimer.html">Disclaimer</a>
      <a href="terms.html">Terms & Conditions</a>
    </div>
    <p>© 2025 Sarkari Prakashan. All rights reserved.</p>
  </footer>

  <script>
    function handleContact(e) {
      e.preventDefault();
      alert("✅ Thank you! Your message has been recorded.");
      e.target.reset();
    }
  </script>
</body>
</html>
